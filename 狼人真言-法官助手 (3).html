<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>狼人真言 · 法官助手</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&display=swap');

  :root{
    --bg: #0e0e1b;
    --bg-2: #131328;
    --surface: #1b1c35;
    --surface-2: #242642;
    --line: #33355a;
    --moon: #e8c874;
    --moon-dim: #a8925a;
    --wolf: #b7434f;
    --wolf-dim: #6e2b32;
    --seer: #8f7cd6;
    --seer-dim: #564a86;
    --text: #ece9f7;
    --text-muted: #9694b5;
    --good: #6fae8f;
    --danger: #c14b4b;
  }

  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html,body{ height:100%; }
  body{
    margin:0;
    background: radial-gradient(ellipse at 50% -10%, #1a1c3a 0%, var(--bg) 55%);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
    min-height: 100vh;
    display:flex;
    justify-content:center;
  }
  #root{
    width:100%;
    max-width: 480px;
    min-height: 100vh;
    padding: env(safe-area-inset-top,0) 0 env(safe-area-inset-bottom,0) 0;
    display:flex;
    flex-direction:column;
    position:relative;
  }
  .display{ font-family:'Cormorant Garamond', Georgia, serif; }

  .screen{ padding: 28px 22px 32px; flex:1; display:flex; flex-direction:column; }
  .screen.animate-in{ animation: fadein .35s ease; }
  @keyframes fadein{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

  .moon-wrap{ display:flex; justify-content:center; margin: 6px 0 18px; }
  .moon-wrap svg{ width:64px; height:64px; }
  .moon-wrap.big svg{ width:96px; height:96px; }

  h1.title{ font-family:'Cormorant Garamond', Georgia, serif; font-weight:600; font-size:30px; letter-spacing:1px; text-align:center; margin:0 0 4px; color:var(--moon); }
  p.subtitle{ text-align:center; color:var(--text-muted); font-size:13px; margin:0 0 28px; letter-spacing:2px; text-transform:uppercase; }

  .btn{
    display:block; width:100%; text-align:center; padding:16px 18px; border-radius:14px;
    border:1px solid var(--line); background:var(--surface); color:var(--text);
    font-size:16px; font-weight:600; margin-bottom:12px; cursor:pointer; transition:transform .12s ease, background .2s ease;
  }
  .btn:active{ transform: scale(0.97); }
  .btn-primary{ background: linear-gradient(160deg, var(--moon), #cf9f4e); color:#231a05; border:none; }
  .btn-wolf{ background: linear-gradient(160deg, var(--wolf), #7c2c34); color:#fbe9e9; border:none; }
  .btn-seer{ background: linear-gradient(160deg, var(--seer), #5b4aa0); color:#f2effc; border:none; }
  .btn-ghost{ background:transparent; border:1px dashed var(--line); color:var(--text-muted); }
  .btn-danger{ background:transparent; border:1px solid var(--danger); color:var(--danger); }
  .btn-sm{ padding:10px 14px; font-size:14px; width:auto; display:inline-block; margin:0; }
  .btn:disabled{ opacity:0.35; }

  .row{ display:flex; gap:10px; }
  .row .btn{ flex:1; }

  .card{ background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:18px; margin-bottom:14px; }
  .field{ margin-bottom:16px; }
  .field:last-child{ margin-bottom:0; }
  .field label{ display:block; font-size:13px; color:var(--text-muted); margin-bottom:6px; letter-spacing:.5px; }
  .field input, .field select, .field textarea{
    width:100%; background:var(--bg-2); border:1px solid var(--line); color:var(--text);
    border-radius:10px; padding:12px 12px; font-size:15px; font-family:inherit;
  }
  .field textarea{ min-height:140px; resize:vertical; line-height:1.6; }
  .stepper{ display:flex; align-items:center; gap:14px; }
  .stepper button{ width:40px; height:40px; border-radius:50%; border:1px solid var(--line); background:var(--surface-2); color:var(--text); font-size:18px; }
  .stepper .val{ font-size:20px; font-weight:600; min-width:56px; text-align:center; }

  .header-nav{ display:flex; align-items:center; gap:12px; padding: 18px 20px 4px; }
  .back-btn{ background:none; border:none; color:var(--text-muted); font-size:22px; padding:4px 8px; cursor:pointer; }
  .header-nav h2{ font-family:'Cormorant Garamond', Georgia, serif; font-size:22px; margin:0; color:var(--text); font-weight:600; }

  .list-item{ display:flex; align-items:center; justify-content:space-between; background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:14px 16px; margin-bottom:10px; }
  .pill{ display:inline-block; padding:3px 10px; border-radius:20px; font-size:12px; font-weight:600; letter-spacing:.5px; }
  .pill-villager{ background:rgba(232,200,116,.15); color:var(--moon); }
  .pill-wolf{ background:rgba(183,67,79,.18); color:#e58e94; }
  .pill-seer{ background:rgba(143,124,214,.18); color:#c2b6f2; }

  .empty{ text-align:center; color:var(--text-muted); padding:40px 10px; font-size:14px; }

  .reveal-stage{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
  .reveal-name{ font-family:'Cormorant Garamond', Georgia, serif; font-size:34px; color:var(--text); margin-bottom:6px; }
  .reveal-hint{ color:var(--text-muted); font-size:14px; margin-bottom:36px; }
  .flip-card{ width:100%; max-width:280px; aspect-ratio: 3/4; perspective: 1200px; margin-bottom:30px; }
  .flip-inner{ position:relative; width:100%; height:100%; transition: transform .6s cubic-bezier(.4,.2,.2,1); transform-style:preserve-3d; }
  .flip-inner.flipped{ transform: rotateY(180deg); }
  .flip-face{ position:absolute; inset:0; backface-visibility:hidden; border-radius:20px; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
  .flip-front{ background: linear-gradient(150deg, var(--surface-2), var(--surface)); border:1px solid var(--line); }
  .flip-back{ transform: rotateY(180deg); border:1px solid var(--line); }
  .flip-back.villager{ background: linear-gradient(150deg, #2a2717, var(--surface)); }
  .flip-back.wolf{ background: linear-gradient(150deg, #2c1518, var(--surface)); }
  .flip-back.seer{ background: linear-gradient(150deg, #201a35, var(--surface)); }
  .role-label{ font-size:13px; letter-spacing:3px; text-transform:uppercase; margin-bottom:10px; }
  .word-main{ font-family:'Cormorant Garamond', Georgia, serif; font-size:42px; font-weight:600; margin:6px 0; }
  .word-sub{ font-size:13px; color:var(--text-muted); margin-top:14px; line-height:1.6; max-width:220px; }
  .teammates{ font-size:13px; margin-top:14px; color:var(--text-muted); }

  .narrate-stage{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
  .narrate-text{ font-family:'Cormorant Garamond', Georgia, serif; font-size:44px; font-weight:600; margin: 10px 0 8px; }
  .narrate-sub{ color:var(--text-muted); font-size:15px; margin-bottom:44px; }
  .narrate-progress{ display:flex; gap:6px; margin-bottom:30px; }
  .narrate-dot{ width:7px; height:7px; border-radius:50%; background:var(--line); }
  .narrate-dot.done{ background:var(--moon-dim); }
  .narrate-dot.active{ background:var(--moon); }

  .timer-display{ text-align:center; margin: 30px 0 18px; }
  .timer-num{ font-family:'Cormorant Garamond', Georgia, serif; font-size:78px; font-weight:600; letter-spacing:2px; line-height:1; }
  .timer-num.warn{ color: var(--danger); }

  .players-grid{ display:flex; flex-wrap:wrap; gap:10px; margin: 14px 0 20px; }
  .player-chip{ padding:10px 14px; border-radius:12px; border:1px solid var(--line); background:var(--surface); font-size:14px; cursor:pointer; }
  .player-chip.selected{ border-color: var(--danger); background: rgba(193,75,75,.15); color:#f0b8b8; }

  .toast{ position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--surface-2); border:1px solid var(--line); padding:12px 20px; border-radius:12px; font-size:14px; z-index:50; box-shadow:0 8px 24px rgba(0,0,0,.4); }

  .word-chip-list{ display:flex; flex-wrap:wrap; gap:8px; }
  .word-chip{ padding:8px 14px; border-radius:10px; background:var(--surface); border:1px solid var(--line); font-size:14px; display:flex; align-items:center; gap:8px; }
  .word-chip .del{ color:var(--danger); cursor:pointer; font-size:13px; }

  ::-webkit-scrollbar{ display:none; }
</style>
</head>

<script>
(function(){

  var lastSpokenIdx = -1;
  var lastScheduledIdx = -1;
  var stepTimer = null;
  var stepAdvanceTimeout = null;

  function clearStepTimers(){
    if(stepTimer){ clearInterval(stepTimer); stepTimer = null; }
    if(stepAdvanceTimeout){ clearTimeout(stepAdvanceTimeout); stepAdvanceTimeout = null; }
  }

  var narrateCountdownEl = null;

  function scheduleNarrateStep(idx){
    if(lastScheduledIdx === idx) return;
    lastScheduledIdx = idx;
    clearStepTimers();
    var step = S.narrateSteps[idx];
    var isLast = idx === S.narrateSteps.length - 1;
    var duration = step.duration || 4000;
    S.stepSecondsLeft = Math.ceil(duration/1000);
    stepTimer = setInterval(function(){
      S.stepSecondsLeft--;
      if(S.stepSecondsLeft < 0) S.stepSecondsLeft = 0;
      if(narrateCountdownEl){ narrateCountdownEl.textContent = S.stepSecondsLeft + ' 秒后自动继续'; }
    }, 1000);
    stepAdvanceTimeout = setTimeout(function(){
      clearStepTimers();
      if(isLast){
        S.timerRemaining = S.timerMinutes * 60;
        S.timerRunning = false;
        S.screen = 'day';
        render();
        setTimeout(function(){ if(!S.timerRunning) toggleTimer(); }, 300);
      } else {
        S.narrateIdx = idx + 1;
        render();
      }
    }, duration);
  }

  function speak(text){
    try{
      if(!('speechSynthesis' in window)) return;
      window.speechSynthesis.cancel();
      setTimeout(function(){
        try{ window.speechSynthesis.resume(); }catch(e){}
        var safeText = text.charAt(0) + text; // 重复第一个字，防止开头被设备吞掉
        var u = new SpeechSynthesisUtterance(safeText);
        u.lang = 'zh-CN';
        u.rate = 0.78;
        u.pitch = 1;
        window.speechSynthesis.speak(u);
      }, 300);
    }catch(e){ console.error('speech failed', e); }
  }

  function moonSVG(phase){
    var maskX = { crescent: 18, new: 4, full: 40, gibbous: 26 }[phase] ?? 18;
    return '<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">'+
      '<defs><mask id="m'+phase+'"><rect width="64" height="64" fill="white"/><circle cx="'+maskX+'" cy="30" r="22" fill="black"/></mask></defs>'+
      '<circle cx="32" cy="32" r="22" fill="#e8c874" mask="url(#m'+phase+')"/>'+
      '<circle cx="32" cy="32" r="22" fill="none" stroke="#3a3860" stroke-width="1"/>'+
      '</svg>';
  }

  /* ---------------- storage ---------------- */
  async function loadWordBank(){
    try{
      var r = await window.storage.get('wordbank_v2', false);

  /* ---------------- state ---------------- */
  var S = {
    screen: 'loading',
    wordBank: [],
    playerCount: 6,
    wolfCount: 2,
    timerMinutes: 3,
    word: null,          // {id, text}
    wordChoices: [],
    narrateSteps: [],
    narrateIdx: 0,
    timerRemaining: 180,
    timerRunning: false,
    timerInterval: null,
    wbBatchText: '',
    toastMsg: null
  };

  function showToast(msg){
    S.toastMsg = msg; render();
    setTimeout(function(){ S.toastMsg = null; render(); }, 1800);
  }
  function goto(screen){ S.screen = screen; render(); }

  async function init(){
    S.wordBank = await loadWordBank();
    S.screen = 'home';
    render();
  }

  /* ---------------- game flow ---------------- */
  function pickWordChoices(){
    var pool = S.wordBank.slice();
    for(var i=pool.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=pool[i]; pool[i]=pool[j]; pool[j]=t; }
    S.wordChoices = pool.slice(0, 3);
    S.word = null;
  }

  function beginSetup(){
    if(S.wordBank.length === 0){ showToast('词库是空的，请先添加真言'); goto('wordbank'); return; }
    pickWordChoices();
    S.screen = 'setup';
    render();
  }

  function startGame(){
    if(!S.word){ showToast('请先选择一个真言'); return; }
    S.narrateSteps = [
      {text:'天黑请闭眼', sub:'所有人闭眼，保持安静', phase:'new', duration:3000},
      {text:'先知请睁眼', sub:'请先知确认本局真言', phase:'crescent', accent:'seer', showWord:true, duration:6000},
      {text:'先知请闭眼', sub:'', phase:'new', accent:'seer', duration:3000},
      {text:'狼人请睁眼', sub:'请狼人确认真言，认准自己的同伙', phase:'crescent', accent:'wolf', showWord:true, duration:8000},
      {text:'狼人请闭眼', sub:'', phase:'new', accent:'wolf', duration:3000},
      {text:'天亮了', sub:'所有人请睁眼，进入讨论环节', phase:'full', duration:3000}
    ];
    S.narrateIdx = 0;
    lastSpokenIdx = -1;
    S.screen = 'narrate';
    render();
  }

  function nextNarrate(){
    clearStepTimers();
    window.speechSynthesis && window.speechSynthesis.cancel();
    S.narrateIdx++;
    if(S.narrateIdx >= S.narrateSteps.length){
      startDay();
      return;
    }
    render();
  }

  function startDay(){
    S.timerRemaining = S.timerMinutes * 60;
    S.timerRunning = false;
    S.screen = 'day';
    render();
  }

  var dayTimerEl = null;

  function toggleTimer(){
    if(S.timerRunning){
      clearInterval(S.timerInterval); S.timerRunning = false; render(); return;
    }
    S.timerRunning = true; render();
    S.timerInterval = setInterval(function(){
      S.timerRemaining--;
      if(S.timerRemaining <= 0){
        S.timerRemaining = 0;
        clearInterval(S.timerInterval);
        S.timerRunning = false;
        revealWord();
        return;
      }
      if(dayTimerEl){
        var mm = Math.floor(S.timerRemaining/60), ss = S.timerRemaining%60;
        dayTimerEl.textContent = (mm<10?'0':'')+mm+':'+(ss<10?'0':'')+ss;
        dayTimerEl.className = 'timer-num' + (S.timerRemaining<=10 ? ' warn' : '');
      } else {
        render();
      }
    }, 1000);
  }
  function resetTimer(){
    clearInterval(S.timerInterval); S.timerRunning = false;
    S.timerRemaining = S.timerMinutes * 60; render();
  }

  function revealWord(){
    clearInterval(S.timerInterval);
    S.timerRunning = false;
    S.screen = 'end';
    render();
  }

  /* ---------------- word bank ---------------- */
  async function wbQuickAdd(text){
    text = text.trim();
    if(!text) return;
    if(S.wordBank.some(function(x){ return x.text === text; })){ showToast('这个词已经在词库里了'); return; }
    S.wordBank.push({ id:'w'+Date.now()+Math.random().toString(36).slice(2,6), text:text });
    await saveWordBank(S.wordBank);
    render();
  }
  async function wbDelete(id){
    S.wordBank = S.wordBank.filter(function(x){ return x.id !== id; });
    await saveWordBank(S.wordBank);
    render();
  }
  async function wbBatchImport(){
    var raw = S.wbBatchText;
    var parts = raw.split(/[\n,，、]+/).map(function(s){ return s.trim(); }).filter(Boolean);
    var existing = {}; S.wordBank.forEach(function(x){ existing[x.text]=true; });
    var added = 0;
    parts.forEach(function(p){
      if(!existing[p]){ S.wordBank.push({ id:'w'+Date.now()+Math.random().toString(36).slice(2,6), text:p }); existing[p]=true; added++; }
    });
    await saveWordBank(S.wordBank);
    S.wbBatchText = '';
    showToast('已导入 '+added+' 个新词');
    goto('wordbank');
  }

  /* ---------------- render ---------------- */
  function el(html){ var t=document.createElement('div'); t.innerHTML = html; return t.firstElementChild; }

  var lastRenderedScreen = null;

  function render(){
    var root = document.getElementById('root');
    root.innerHTML = '';
    if(S.screen === 'loading'){ root.appendChild(el('<div class="screen" style="justify-content:center;align-items:center;"><div class="moon-wrap">'+moonSVG('crescent')+'</div></div>')); return; }

    if(S.screen === 'home') renderHome(root);
    else if(S.screen === 'setup') renderSetup(root);
    else if(S.screen === 'narrate') renderNarrate(root);
    else if(S.screen === 'day') renderDay(root);
    else if(S.screen === 'end') renderEnd(root);
    else if(S.screen === 'wordbank') renderWordbank(root);
    else if(S.screen === 'wordbank-batch') renderWordbankBatch(root);

    if(S.screen !== lastRenderedScreen){
      var screenEl = root.querySelector('.screen');
      if(screenEl) screenEl.classList.add('animate-in');
      lastRenderedScreen = S.screen;
    }
  }

      '  <p style="color:var(--text-muted);font-size:12px;text-align:center;">时间到会自动揭晓真言</p>'+
      '  <div style="flex:1"></div>'+
      '  <button class="btn btn-danger" id="reveal">结束讨论，揭晓真言</button>'+
      '</div>';
    root.appendChild(s);
    dayTimerEl = s.querySelector('#tnum');
    s.querySelector('#toggle').onclick = toggleTimer;
    s.querySelector('#reset').onclick = resetTimer;
    s.querySelector('#reveal').onclick = revealWord;
  }

  function renderEnd(root){
    var s = el('<div class="screen" style="justify-content:center;align-items:center;text-align:center;"></div>');
    s.innerHTML =
      '<div class="moon-wrap">'+moonSVG('full')+'</div>'+
      '<h1 class="title">真言揭晓</h1>'+
      '<p class="word-main" style="color:var(--moon);margin:0 0 30px;">'+S.word.text+'</p>'+
      '<button class="btn btn-primary" id="newgame" style="max-width:280px;">开始新游戏</button>';
    root.appendChild(s);
    s.querySelector('#newgame').onclick = function(){
      S.word = null; S.wordChoices = [];
      beginSetup();
    };
  }

  function renderWordbank(root){
    var s = el('<div></div>');
    var chips = S.wordBank.map(function(p){
      return '<div class="word-chip">'+p.text+'<span class="del" data-del="'+p.id+'">✕</span></div>';
    }).join('');
    s.innerHTML =
      '<div class="header-nav"><button class="back-btn" id="back">‹</button><h2>词库管理</h2></div>'+
      '<div class="screen" style="padding-top:8px;">'+
      '  <div class="card"><div class="field" style="margin-bottom:10px;"><label>快速添加一个真言</label>'+
      '    <div class="row"><input id="quick-input" placeholder="输入一个词，回车添加"/></div>'+
      '  </div></div>'+
      (chips ? '<div class="word-chip-list" style="margin-bottom:20px;">'+chips+'</div>' : '<div class="empty">还没有真言，添加或批量导入吧</div>')+
      '  <div style="flex:1"></div>'+
      '  <button class="btn" id="batch">批量导入词语</button>'+
      '</div>';
    root.appendChild(s);
    if(S.toastMsg) root.appendChild(el('<div class="toast">'+S.toastMsg+'</div>'));
    s.querySelector('#back').onclick = function(){ goto('home'); };
    s.querySelector('#batch').onclick = function(){ goto('wordbank-batch'); };
    var input = s.querySelector('#quick-input');
    input.onkeydown = function(e){
      if(e.key === 'Enter'){ wbQuickAdd(input.value).then(function(){ /* re-rendered inside */ }); input.value=''; }
    };
    s.querySelectorAll('[data-del]').forEach(function(b){ b.onclick=function(){ wbDelete(b.getAttribute('data-del')); }; });
  }

  function renderWordbankBatch(root){
    var s = el('<div></div>');
    s.innerHTML =
      '<div class="header-nav"><button class="back-btn" id="back">‹</button><h2>批量导入</h2></div>'+
      '<div class="screen" style="padding-top:8px;">'+
      '  <div class="card">'+
      '    <div class="field"><label>粘贴词语，每行一个（也支持用逗号、顿号分隔）</label>'+
      '      <textarea id="batch-input" placeholder="苹果\n篮球\n老师\n..."></textarea>'+
      '    </div>'+
      '  </div>'+
      '  <div style="flex:1"></div>'+
      '  <button class="btn btn-primary" id="import">导入</button>'+
      '</div>';
    root.appendChild(s);
    s.querySelector('#back').onclick = function(){ goto('wordbank'); };
    var ta = s.querySelector('#batch-input');
    ta.value = S.wbBatchText;
    ta.oninput = function(e){ S.wbBatchText = e.target.value; };
    s.querySelector('#import').onclick = wbBatchImport;
  }

  /* ---------------- 屏幕常亮 ---------------- */
  var wakeLock = null;
  var wakeLockStatus = '正在尝试开启常亮…';
  async function requestWakeLock(){
    try{
      if('wakeLock' in navigator){
        wakeLock = await navigator.wakeLock.request('screen');
        wakeLockStatus = '✓ 屏幕常亮已开启';
        wakeLock.addEventListener('release', function(){ wakeLock = null; wakeLockStatus = '常亮已释放，点击屏幕重新开启'; updateStatusEl(); });
        updateStatusEl();
        return true;
      } else {
        wakeLockStatus = '此浏览器不支持常亮接口';
        updateStatusEl();
        return false;
      }
    }catch(e){
      wakeLockStatus = '常亮被拒绝：' + (e && e.message ? e.message : '未知原因');
      updateStatusEl();
      return false;
    }
  }
  function tryNoSleepVideo(){
    try{
      var v = document.getElementById('nosleep-video');
      if(v && v.paused){
        v.play().then(function(){
          if(!wakeLock){ wakeLockStatus = '✓ 已用备用方式保持常亮'; updateStatusEl(); }
        }).catch(function(){});
      }
    }catch(e){}
  }
  function updateStatusEl(){
    var el = document.getElementById('wakelock-status');
    if(el) el.textContent = wakeLockStatus;
  }
  function keepScreenAwake(){
    requestWakeLock();
    tryNoSleepVideo();
  }
  document.addEventListener('visibilitychange', function(){
    if(document.visibilityState === 'visible'){ keepScreenAwake(); }
  });
  document.getElementById('root').addEventListener('click', keepScreenAwake);
  keepScreenAwake();

  init();
})();
</script>
</body>
</html>
